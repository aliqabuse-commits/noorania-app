<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>النورانية العالمية — المرحلة الثانية</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="book-header">
      <div class="ribbon">
        <div class="ribbon-green">المرحلة الثانية</div>
        <div class="ribbon-red" id="headerTitle">الحروف المتحركة والمنونة</div>
      </div>
      <div class="header-note" id="headerNote">
        نسخة منظمة: الواجهة منفصلة، البيانات منفصلة، محرك القراءة منفصل، ومحرك الصوت منفصل.
      </div>
    </header>

    <main class="content">
      <section id="screen-stage" class="screen active">
        <div class="card">
          <h2>المرحلة الثانية</h2>
          <p class="muted">اختر الدرس. كل درس صار بيانات مستقلة تعمل عبر نفس محرك القراءة.</p>
          <div id="lessonsList" class="list"></div>
        </div>
      </section>

      <section id="screen-lesson" class="screen">
        <div class="card">
          <button class="ghost" onclick="UI.goStage()">عودة إلى المرحلة الثانية</button>
          <h2 id="lessonTitle"></h2>
          <p class="muted" id="lessonDescription"></p>
          <div class="tabs" id="lessonTabs"></div>
        </div>

        <div class="card" id="itemsCard">
          <h3 id="itemsTitle">العناصر</h3>
          <div id="itemsGrid" class="grid"></div>
        </div>

        <div class="card">
          <div class="big" id="selectedMain">—</div>

          <div class="read">
            <div class="read-title">القراءة النورانية</div>
            <div class="read-content" id="nooraniBox"></div>
          </div>

          <div class="read">
            <div class="read-title">القراءة التقطيعية</div>
            <div class="read-content" id="taqtiBox"></div>
          </div>

          <div class="read">
            <div class="read-title">القراءة الحرة</div>
            <div class="read-content" id="freeBox"></div>
          </div>

          <div class="buttons">
            <button class="blue" onclick="UI.play('noorani')">استمع النورانية</button>
            <button class="green" onclick="UI.play('taqti')">استمع التقطيعية</button>
            <button class="blue" onclick="UI.play('free')">استمع الحرة</button>
            <button class="green" onclick="AudioEngine.stop()">إيقاف الصوت</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="./data/stage2-data.js"></script>
  <script src="./engine/reading-engine.js"></script>
  <script src="./engine/audio-engine.js"></script>
  <script src="./app.js"></script>
</body>
</html>
